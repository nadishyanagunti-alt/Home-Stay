<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Misty Hills Homestay</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Poppins,sans-serif;
}

body{
    background:#f5f5f5;
}

nav{
    background:#032f4f;
    color:white;
    padding:20px 8%;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.logo{
    font-size:28px;
    font-weight:bold;
}

.logo span{
    color:#ff6b00;
}

.hero{
    height:50vh;
    background:
    linear-gradient(rgba(0,0,0,0.5),rgba(0,0,0,0.5)),
    url('https://images.unsplash.com/photo-1506744038136-46273834b3fb?q=80&w=1600&auto=format&fit=crop');
    background-size:cover;
    background-position:center;
    display:flex;
    align-items:center;
    justify-content:center;
    color:white;
    text-align:center;
}

.hero h1{
    font-size:60px;
}

.rooms-section{
    padding:60px 8%;
}

.title{
    text-align:center;
    margin-bottom:40px;
}

.title h2{
    font-size:40px;
    color:#032f4f;
}

.rooms{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
    gap:30px;
}

.room-card{
    background:white;
    border-radius:20px;
    overflow:hidden;
    box-shadow:0 5px 20px rgba(0,0,0,0.1);
    transition:0.3s;
}

.room-card:hover{
    transform:translateY(-8px);
}

.room-card img{
    width:100%;
    height:220px;
    object-fit:cover;
}

.room-content{
    padding:20px;
}

.room-content h3{
    color:#032f4f;
    margin-bottom:10px;
}

.room-content p{
    color:#666;
    margin-bottom:15px;
}

.price{
    color:#ff6b00;
    font-weight:bold;
    font-size:20px;
    margin-bottom:15px;
}

.btn{
    display:inline-block;
    padding:12px 22px;
    background:#ff6b00;
    color:white;
    text-decoration:none;
    border-radius:30px;
}

footer{
    background:#032f4f;
    color:white;
    text-align:center;
    padding:20px;
    margin-top:50px;
}

</style>
</head>

<body>

<nav>
    <div class="logo">Misty<span>Hills</span></div>
</nav>

<section class="hero">
    <div>
        <h1>Mountain Rooms</h1>
        <p>Choose your perfect stay</p>
    </div>
</section>

<section class="rooms-section">

    <div class="title">
        <h2>Available Rooms</h2>
    </div>

    <div class="rooms" id="roomsContainer"></div>

</section>

<footer>
    © 2026 Misty Hills Homestay
</footer>

<script>

fetch("rooms.json")
.then(response => response.json())
.then(data => {

    const container = document.getElementById("roomsContainer");

    data.forEach(room => {

        container.innerHTML += `

        <div class="room-card">

            <img src="${room.image}" alt="room">

            <div class="room-content">

                <h3>${room.name}</h3>

                <p>${room.short_description}</p>

                <div class="price">₹${room.price} / night</div>

                <a href="room.html?id=${room.id}" class="btn">
                    View Details
                </a>

            </div>

        </div>

        `;

    });

});

</script>

</body>
</html>
